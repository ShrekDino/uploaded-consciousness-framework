name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install ruff
          pip install -e .
      - name: Lint
        run: ruff check consciousness/ scripts/ config.py
      - name: Check formatting
        run: ruff format --check consciousness/ scripts/ config.py
